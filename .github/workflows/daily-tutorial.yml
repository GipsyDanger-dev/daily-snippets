name: Daily AI Tutorial

on:
  schedule:
    - cron: '0 11 * * *'   # 19:00 WIB - Afternoon
    - cron: '0 15 * * *'   # 23:00 WIB - Evening
    - cron: '0 3 * * *'    # 11:00 WIB - Morning
  workflow_dispatch:
    inputs:
      session:
        description: 'Session to generate'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - morning
          - afternoon
          - evening

permissions:
  contents: write

jobs:
  generate-morning:
    if: github.event.schedule == '0 3 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.session == 'all' || github.event.inputs.session == 'morning'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Generate tutorial
        run: python generate.py --session morning
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "🌅 Morning tutorial - $(date +'%Y-%m-%d')"
          git push

  generate-afternoon:
    if: github.event.schedule == '0 11 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.session == 'all' || github.event.inputs.session == 'afternoon'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Generate tutorial
        run: python generate.py --session afternoon
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "☀️ Afternoon tutorial - $(date +'%Y-%m-%d')"
          git push

  generate-evening:
    if: github.event.schedule == '0 15 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.session == 'all' || github.event.inputs.session == 'evening'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Generate tutorial
        run: python generate.py --session evening
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "🌙 Evening tutorial - $(date +'%Y-%m-%d')"
          git push
