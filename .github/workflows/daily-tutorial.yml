name: Daily AI Tutorial

on:
  schedule:
    - cron: '0 11 * * *'   # 19:00 WIB
    - cron: '0 15 * * *'   # 23:00 WIB
    - cron: '0 3 * * *'    # 11:00 WIB
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generate all sessions
        run: |
          python generate.py --session morning
          python generate.py --session afternoon
          python generate.py --session evening

      - name: Commit and push
        run: |
          git config user.name "GipsyDanger-dev"
          git config user.email "sharkjira99@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m "📚 Daily tutorials - $(date +'%Y-%m-%d')"
          git push
